name: .NET Framework 4.8 CI with Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'  # Akan trigger release jika push tag seperti v1.0.0
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET Framework
      run: |
        # .NET Framework 4.8 is pre-installed on windows-latest
        echo "Using .NET Framework 4.8"
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore packages
      run: nuget restore "./VB.Net/Qualcomm Tools GUI VB.Net.sln"
      
    - name: Build
      run: msbuild "./VB.Net/Qualcomm Tools GUI VB.Net.sln" /p:Configuration=Release /p:TargetFrameworkVersion=v4.8
      
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: Qualcomm-Tool-GUI
        path: |
          VB.Net\Qualcomm Tools GUI VB.Net\bin\Release\*.exe
          VB.Net\Qualcomm Tools GUI VB.Net\bin\Release\*.dll
          VB.Net\Qualcomm Tools GUI VB.Net\bin\Release\*.config
        if-no-files-found: error
        
  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # Hanya jalan jika ada tag
    permissions:
      contents: write
      
    steps:
    - name: Download EXE artifact
      uses: actions/download-artifact@v4
      with:
        name: Qualcomm-Tool-GUI
        path: release-files
        
    - name: Create ZIP file
      run: |
        cd release-files
        zip -r ../Qualcomm-Tool-GUI-${{ github.ref_name }}.zip .
        cd ..
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Qualcomm-Tool-GUI-${{ github.ref_name }}.zip
        name: Release ${{ github.ref_name }}
        body: |
          ## Qualcomm Tool GUI - Release ${{ github.ref_name }}
          
          ### 📦 File yang termasuk:
          - Executable file (.exe)
          - Required DLLs
          - Configuration files
          
          ### 🔧 Cara Penggunaan:
          1. Download file ZIP
          2. Extract ke folder tujuan
          3. Jalankan `Qualcomm Tools GUI VB.Net.exe`
          
          ### ⚙️ System Requirements:
          - Windows OS
          - .NET Framework 4.8 or later
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
